<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love, Issa ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Georgia',serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at top,#ffd6e0,#ff8fab,#c9184a);
color:white;
}


.stars{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{
opacity:.2;
}
50%{
opacity:1;
}
}


.container{

width:90%;
max-width:500px;
text-align:center;
padding:30px;

}


h1{
font-size:45px;
margin-bottom:10px;
text-shadow:0 5px 20px rgba(0,0,0,.3);
}


.subtitle{
font-size:20px;
margin-bottom:35px;
}


.gift-area{
cursor:pointer;
}


.gift{

position:relative;
width:160px;
height:120px;
margin:auto;

}


.box{

position:absolute;
bottom:0;
width:160px;
height:100px;
background:#d62828;
border-radius:8px;

}


.box:before{

content:"";
position:absolute;
left:65px;
width:30px;
height:100%;
background:#ffccd5;

}


.lid{

position:absolute;
top:0;
width:180px;
height:35px;
left:-10px;
background:#e63946;
border-radius:8px;

}


.ribbon{

position:absolute;
left:75px;
top:-20px;
width:10px;
height:140px;
background:#ffccd5;

}


.gift-text{

margin-top:20px;
font-size:18px;
}


.hidden{
display:none;
}


</style>
</head>


<body>


<div class="stars" id="stars"></div>


<div class="container">


<h1>❤️ Love, Issa ❤️</h1>

<div class="subtitle">
A special surprise for you...
</div>


<div class="gift-area" onclick="openGift()">

<div class="gift">

<div class="lid"></div>

<div class="box"></div>

<div class="ribbon"></div>

</div>


<div class="gift-text">
🎁 Open your gift
</div>


</div>


<div id="letter" class="hidden">

</div>


</div>


<script>


// yıldız oluşturma

for(let i=0;i<80;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDelay=Math.random()*3+"s";

document.getElementById("stars").appendChild(star);

}



function openGift(){

document.querySelector(".gift-area").style.display="none";

document.getElementById("letter").classList.remove("hidden");

}
// mektup içeriği

document.getElementById("letter").innerHTML = `

<div class="letter-box">

<h2>💌 My Love</h2>

<p>
Every moment with you is a beautiful gift.
<br><br>
I can't wait for the day we start our new journey together.
<br><br>
With love,
<br>
<strong>Issa ❤️</strong>
</p>


<div class="count-title">
Our special day is coming...
</div>


<div id="countdown">


<div class="count">
<span id="days">0</span>
Days
</div>


<div class="count">
<span id="hours">0</span>
Hours
</div>


<div class="count">
<span id="minutes">0</span>
Minutes
</div>


<div class="count">
<span id="seconds">0</span>
Seconds
</div>


</div>


</div>

`;



// geri sayım

const target = new Date("November 12, 2026 00:00:00").getTime();


setInterval(()=>{


const now = new Date().getTime();

const distance = target - now;


const days = Math.floor(distance/(1000*60*60*24));

const hours = Math.floor(
(distance%(1000*60*60*24))/(1000*60*60)
);


const minutes = Math.floor(
(distance%(1000*60*60))/(1000*60)
);


const seconds = Math.floor(
(distance%(1000*60))/1000
);


document.getElementById("days").innerHTML=days;

document.getElementById("hours").innerHTML=hours;

document.getElementById("minutes").innerHTML=minutes;

document.getElementById("seconds").innerHTML=seconds;


},1000);
.letter-box{

background:rgba(255,255,255,.95);
color:#8b1e3f;
padding:30px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
animation:showLetter 1s ease;

}


.letter-box h2{

font-size:35px;
margin-bottom:20px;

}


.letter-box p{

font-size:18px;
line-height:1.7;

}


@keyframes showLetter{

from{
transform:scale(0);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}



.count-title{

margin-top:25px;
font-size:20px;

}



#countdown{

display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
flex-wrap:wrap;

}



.count{

background:#ff8fab;
color:white;
padding:12px;
border-radius:15px;
min-width:70px;

}


.count span{

display:block;
font-size:25px;
font-weight:bold;

}
</script>


</body>
</html>

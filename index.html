<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love, Issa ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Georgia", serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    color:#222;
}

.container{
    width:90%;
    max-width:500px;
    text-align:center;
}

h1{
    font-size:48px;
    font-weight:normal;
    margin-bottom:20px;
}

.subtitle{
    font-size:20px;
    color:#777;
    line-height:1.6;
}

.heart{
    font-size:40px;
    margin-bottom:20px;
}

.line{
    width:80px;
    height:2px;
    background:#222;
    margin:30px auto;
}

button{

    background:#111;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    margin-top:30px;

}

button:hover{
    opacity:.8;
}

.gift{
    display:none;
    margin-top:40px;
    cursor:pointer;
}

.box{
    width:140px;
    height:100px;
    background:#f8d7da;
    margin:auto;
    border-radius:12px;
    position:relative;
    box-shadow:0 15px 30px rgba(0,0,0,.15);
}


.lid{
    width:150px;
    height:25px;
    background:#ffffff;
    border:1px solid #eee;
    position:absolute;
    top:-20px;
    left:-5px;
    border-radius:12px;
}


.ribbon{
    width:15px;
    height:100px;
    background:#d4af37;
    position:absolute;
    left:62px;
}


.gift:hover{
    transform:scale(1.05);
    transition:.4s;
}

.letter{
    display:none;
    margin-top:30px;
    padding:25px;
    border:1px solid #ddd;
    border-radius:20px;
    line-height:1.7;
}
</style>

</head>

<div class="gift" onclick="showLetter()">

<div class="box">
<div class="lid"></div>
<div class="ribbon"></div>
</div>

<p>Tap the gift 🎁</p>

</div>


<div class="letter">

<h2>My Love ❤️</h2>

<p>
Every moment with you is a beautiful blessing.
<br><br>
I can't wait for the day we start our journey together.
<br><br>
With love,
<br>
Issa
</p>

</div>


<script>

function openGift(){

document.querySelector(".gift").style.display="block";

}


function showLetter(){

document.querySelector(".letter").style.display="block";

}

</script>
<body>


<div class="container">

<div class="heart">
❤️
</div>


<h1>
Love, Issa
</h1>


<div class="line"></div>


<p class="subtitle">
A little surprise made with love.
<br>
Our story continues...
</p>


<button onclick="openGift()">
Open
</button>


</div>


</body>

</html>
